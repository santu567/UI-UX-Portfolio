<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Top Face Gradient (Magenta) -->
    <linearGradient id="top" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#be185d"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    
    <!-- Left Face Gradient (Violet) -->
    <linearGradient id="left" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    
    <!-- Right Face Gradient (Cyan) -->
    <linearGradient id="right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g filter="url(#glow)">
    <polygon points="50,50 20,32 50,15 80,32" fill="url(#top)" />
    <polygon points="50,50 50,85 20,68 20,32" fill="url(#left)" />
    <polygon points="50,50 80,32 80,68 50,85" fill="url(#right)" />
  </g>
  
  <!-- Add a bright center highlight -->
  <polygon points="50,50 20,32 50,15 80,32" fill="#ffffff" opacity="0.2" />
  <polyline points="50,50 50,85" stroke="#ffffff" stroke-width="1.5" opacity="0.3" />
  <polyline points="50,50 20,32" stroke="#ffffff" stroke-width="1.5" opacity="0.5" />
  <polyline points="50,50 80,32" stroke="#ffffff" stroke-width="1.5" opacity="0.5" />
</svg>